<!DOCTYPE html>
<html>
  <head>
    <title>Simrail paper timetables</title>
  </head>
  <body>
    <div style=" position: absolute; top: 40%; left: 50%;  transform: translate(-50%, -50%); text-align: center; ">
      <h1>Find timetable</h1>
      <input id="page" placeholder="Enter train number">
      <br>
      <a id="go">Go</a>

      <script>
      const input = document.getElementById("page");
      const link = document.getElementById("go");

      input.addEventListener("input", () => {
          link.href = "./" + input.value + "/1.html";
      });
      </script>
    </div>
  </body>
</html>
